<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Matte-Jeopardy: Ma 1a</title>
    <style>
        :root {
            --bg-color: #1e0d0d;
            --text-gold: #f1c40f;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        h1 { 
            color: var(--text-gold); 
            text-shadow: 3px 3px 5px rgba(0,0,0,0.5); 
            font-size: 2.8em;
            margin-bottom: 10px;
        }

        .score-box { 
            background: #27ae60; 
            color: white; 
            padding: 10px 30px; 
            display: inline-block; 
            border-radius: 50px; 
            font-weight: bold; 
            margin-bottom: 25px; 
            font-size: 1.4em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #2ecc71;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 12px; 
            max-width: 1300px; 
            margin: 0 auto; 
        }

        .category-header { 
            background: #333; 
            padding: 15px 5px; 
            font-weight: bold; 
            border-radius: 8px; 
            font-size: 0.8em; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 70px; 
            text-transform: uppercase;
            border-bottom: 4px solid #111;
        }

        /* 3D Cell Styling */
        .cell { 
            padding: 25px 10px; 
            cursor: pointer; 
            border-radius: 12px; 
            font-size: 1.1em; 
            transition: all 0.1s ease; 
            border: none;
            font-weight: bold; 
            color: white; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Dynamiska färger baserat på CSS-variabler som sätts i JS */
        .cell:hover { 
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .cell:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }

        .cell.disabled { 
            background: #444 !important; 
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.5) !important;
            cursor: not-allowed; 
            opacity: 0.6; 
            color: #888;
            transform: translateY(4px);
        }

        /* Modal / Frågeruta */
        #modal { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: white; 
            color: #333; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); 
            width: 90%; 
            max-width: 650px; 
            z-index: 1001; 
        }

        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 1000; 
        }
        
        button { 
            margin: 10px; padding: 15px 30px; 
            cursor: pointer; background: #e67e22; 
            color: white; border: none; border-radius: 10px; 
            font-size: 1.1em; font-weight: bold;
            box-shadow: 0 4px 0 #a04500;
        }

        .option { 
            display: block; margin: 12px 0; text-align: left; 
            padding: 18px; background: #fff5f0; 
            border: 2px solid #ffccab; border-radius: 12px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <h1>MATTE-JEOPARDY</h1>
    <div class="score-box" id="score-display">POÄNG: 0</div>
    
    <div class="grid" id="game-board"></div>

    <div class="overlay" id="overlay"></div>
    <div id="modal">
        <h2 id="modal-category" style="margin-top:0;"></h2>
        <hr>
        <div id="question-text" style="font-size: 1.4em; margin: 25px 0;"></div>
        <div id="answer-area"></div>
        <button onclick="checkAnswer()">Skicka svar</button>
        <button onclick="closeModal()" style="background:#7f8c8d; box-shadow: 0 4px 0 #555;">Stäng</button>
    </div>

    <script>
        const categories = ["Ekvationer m. parentes", "Faktorisering", "Algebraiska uttryck", "Ange formeln", "Formel, tabell & graf", "Linjära funktioner"];
        
        // Färgpalett för kategorierna (HSL för att enkelt kunna styra ljusstyrkan)
        // H-värden: 0=Röd, 330=Rosa, 25=Orange, 10=Korall, 350=Djuprosa, 45=Guld/Orange
        const categoryHues = [0, 330, 25, 10, 350, 45];

        const questions = {
            // KATEGORI 1: Ekvationer m. parentes
            "Ekvationer m. parentes-1": { q: "Vilket är första steget i att förenkla 2(5y + 3) = 6 + 7y?", type: "multi", options: ["10y + 6 = 6 + 7y", "10y + 3 = 6 + 7y", "7y + 5 = 6 + 7y"], a: ["10y + 6 = 6 + 7y"] },
            "Ekvationer m. parentes-2": { q: "Förenkla VL i ekvationen: 4(3x - 5) = 2x + 10", type: "multi", options: ["12x - 20 = 2x + 10", "12x - 5 = 2x + 10", "7x - 20 = 2x + 10"], a: ["12x - 20 = 2x + 10"] },
            "Ekvationer m. parentes-3": { q: "Lös ekvationen: 5(a - 1) = 15 - 3(a + 4)", type: "text", a: "1" },
            // ... fyll på fler här ...
        };

        // Fyller ut Nivå 1-5 för alla kategorier
        for (let i = 1; i <= 5; i++) {
            categories.forEach(cat => {
                if (!questions[`${cat}-${i}`]) {
                    questions[`${cat}-${i}`] = { q: `Fråga för ${cat} - Nivå ${i}`, type: "text", a: "svar" };
                }
            });
        }

        let totalScore = 0;
        let currentQ = null;
        let currentId = null;

        function init() {
            const board = document.getElementById('game-board');
            
            // Skapa rubriker
            categories.forEach((c, index) => {
                const hue = categoryHues[index];
                board.innerHTML += `<div class="category-header" style="background: hsl(${hue}, 70%, 40%);">${c}</div>`;
            });
            
            // Skapa rutorna med graderad färg
            for(let row=1; row<=5; row++) {
                categories.forEach((cat, colIndex) => {
                    const id = `${cat}-${row}`;
                    const hue = categoryHues[colIndex];
                    
                    // Ljusstyrka (Lightness): Nivå 1 = 70% (Ljus), Nivå 5 = 30% (Mörk)
                    const lightness = 80 - (row * 10); 
                    const shadowColor = `hsl(${hue}, 80%, ${lightness - 15}%)`;
                    const bgColor = `linear-gradient(145deg, hsl(${hue}, 80%, ${lightness + 5}%), hsl(${hue}, 80%, ${lightness}%))`;
                    
                    board.innerHTML += `
                        <div class="cell" id="${id}" 
                             onclick="openQ('${cat}', ${row})" 
                             style="background: ${bgColor}; box-shadow: 0 8px 0 ${shadowColor}, 0 10px 20px rgba(0,0,0,0.4);">
                             Nivå ${row}
                        </div>`;
                });
            }
        }

        function openQ(cat, row) {
            currentId = `${cat}-${row}`;
            currentQ = questions[currentId];
            document.getElementById('modal-category').innerText = cat + " - Nivå " + row;
            document.getElementById('question-text').innerHTML = currentQ.q;
            const area = document.getElementById('answer-area');
            area.innerHTML = "";

            if(currentQ.type === "text") {
                area.innerHTML = `<input type="text" id="ans" placeholder="Svar..." autocomplete="off">`;
            } else {
                currentQ.options.forEach(o => {
                    area.innerHTML += `<label class="option"><input type="checkbox" name="multi" value="${o}"> ${o}</label>`;
                });
            }
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function checkAnswer() {
            let correct = false;
            if(currentQ.type === "text") {
                const val = document.getElementById('ans').value.replace(/\s/g, "").toLowerCase();
                const target = currentQ.a.replace(/\s/g, "").toLowerCase();
                if(val === target || (parseFloat(val) === parseFloat(target))) correct = true;
            } else {
                const picked = Array.from(document.querySelectorAll('input[name="multi"]:checked')).map(e => e.value);
                correct = picked.length === currentQ.a.length && picked.every(val => currentQ.a.includes(val));
            }

            if(correct) {
                alert("Klockrent!");
                totalScore += 100;
                document.getElementById('score-display').innerText = "POÄNG: " + totalScore;
                const cell = document.getElementById(currentId);
                cell.classList.add('disabled');
                cell.onclick = null;
                cell.innerText = "✔";
                closeModal();
            } else {
                alert("Försök igen!");
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        init();
    </script>
</body>
</html>

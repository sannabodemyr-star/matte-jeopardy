<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Matte-Jeopardy: Ma 1a</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a2a3a; color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #f1c40f; text-shadow: 2px 2px #000; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-width: 1200px; margin: 20px auto; }
        .category-header { background: #2980b9; padding: 15px; font-weight: bold; border-radius: 5px; font-size: 0.9em; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .cell { background: #34495e; padding: 20px; cursor: pointer; border-radius: 5px; font-size: 1.5em; transition: 0.3s; border: 2px solid #2c3e50; }
        .cell:hover { background: #f1c40f; color: #2c3e50; transform: scale(1.05); }
        .cell.disabled { background: #27ae60; cursor: not-allowed; opacity: 0.6; color: white; }

        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                 background: white; color: #333; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.7); width: 90%; max-width: 600px; z-index: 1001; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        
        button { margin: 10px; padding: 12px 25px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 5px; font-size: 1em; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 1.1em; }
        .option { display: block; margin: 15px 0; text-align: left; padding: 10px; background: #f9f9f9; border-radius: 5px; cursor: pointer; }
    </style>
</head>

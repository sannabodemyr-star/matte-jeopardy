<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Matte-Jeopardy: Ma 1a</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a2a3a; color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #f1c40f; text-shadow: 2px 2px #000; margin-bottom: 5px; }
        .score-box { background: #2ecc71; color: white; padding: 10px 20px; display: inline-block; border-radius: 20px; font-weight: bold; margin-bottom: 20px; font-size: 1.2em; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-width: 1200px; margin: 0 auto; }
        .category-header { background: #2980b9; padding: 15px; font-weight: bold; border-radius: 5px; font-size: 0.85em; display: flex; align-items: center; justify-content: center; min-height: 50px; line-height: 1.2; }
        .cell { background: #34495e; padding: 25px 10px; cursor: pointer; border-radius: 5px; font-size: 1.2em; transition: 0.3s; border: 2px solid #2c3e50; font-weight: bold; color: #f1c40f; }
        .cell:hover { background: #f1c40f; color: #2c3e50; transform: translateY(-3px); }
        .cell.disabled { background: #27ae60; cursor: not-allowed; opacity: 0.4; color: white; border-color: #27ae60; }

        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                 background: white; color: #333; padding: 30px; border-radius: 15px; box-shadow: 0 0 40px rgba(0,0,0,0.8); width: 90%; max-width: 600px; z-index: 1001; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }
        
        /* Bildstyling */
        #question-text img { display: block; margin: 15px auto; max-width: 100%; border-radius: 5px; border: 1px solid #ccc; }

        button { margin: 10px; padding: 12px 25px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; font-size: 1.2em; }
        .option { display: block; margin: 12px 0; text-align: left; padding: 15px; background: #edf2f7; border-radius: 8px; cursor: pointer; border: 1px solid #cbd5e0; }
        .option:hover { background: #e2e8f0; }
    </style>
</head>
<body>

    <h1>MATTE-JEOPARDY</h1>
    <div class="score-box" id="score-display">POÄNG: 0</div>
    
    <div class="grid" id="game-board"></div>

    <div class="overlay" id="overlay"></div>
    <div id="modal">
        <h2 id="modal-category" style="color:#2980b9; margin-top:0;"></h2>
        <hr>
        <div id="question-text" style="font-size: 1.3em; margin: 25px 0;"></div>
        <div id="answer-area"></div>
        <button onclick="checkAnswer()">Skicka svar</button>
        <button onclick="closeModal()" style="background:#e74c3c">Stäng</button>
    </div>

    <script>
        const categories = ["Ekvationer m. parentes", "Faktorisering", "Algebraiska uttryck", "Ange formeln", "Formel, tabell & graf", "Linjära funktioner"];
        let totalScore = 0;

        const questions = {
            // Kategori 1: Ekvationer med parenteser
            "Ekvationer m. parentes-1": { 
                q: "Vilket är det första steget i att förenkla ekvationen 2(5y + 3) = 6 + 7y?", 
                type: "multi", 
                options: ["10y + 6 = 6 + 7y", "10y + 3 = 6 + 7y", "7y + 5 = 6 + 7y", "10y + 6 = 13y"], 
                a: ["10y + 6 = 6 + 7y"] 
            },
            "Ekvationer m. parentes-2": { 
                q: "Förenkla VL och HL i ekvationen: 4(3x - 5) = 2x + 10", 
                type: "multi", 
                options: ["12x - 20 = 2x + 10", "12x - 5 = 2x + 10", "7x - 20 = 2x + 10", "12x - 20 = 12x"], 
                a: ["12x - 20 = 2x + 10"] 
            },
            "Ekvationer m. parentes-3": { q: "Lös ekvationen: 5(a - 1) = 15 - 3(a + 4)", type: "text", a: "1" },

            // Kategori 2: Faktorisering
            "Faktorisering-1": { 
                q: "Vilket uttryck får du om du bryter ut största faktor ur 18a + 9b?", 
                type: "multi", 
                options: ["9(2a + b)", "18(a + b)", "9(a + b)"], 
                a: ["9(2a + b)"] 
            },
            "Faktorisering-2": { 
                q: "Vilken är den största gemensamma faktorn i 7x² - 14x?", 
                type: "multi", 
                options: ["7x", "x", "7", "14x"], 
                a: ["7x"] 
            },
            "Faktorisering-3": { q: "Bryt ut största möjliga faktor ur 12xy² + 6x²y", type: "text", a: "6xy(2y+x)" },

            // Kategori 3: Algebraiska uttryck
            "Algebraiska uttryck-1": { 
                q: "A = Alvas ålder, B = Berits ålder. Vad betyder A = B + 7?", 
                type: "multi", 
                options: ["Alva är 7 år äldre än Berit", "Berit är 7 år äldre än Alva"], 
                a: ["Alva är 7 år äldre än Berit"] 
            },
            "Algebraiska uttryck-2": { 
                q: "Vilka av följande påståenden stämmer för uttrycket A - B = -9?", 
                type: "multi", 
                options: ["Alva är 9 år yngre än Berit", "Berit är 9 år äldre än Alva", "Alva är 9 år äldre"], 
                a: ["Alva är 9 år yngre än Berit", "Berit är 9 år äldre än Alva"] 
            },
            "Algebraiska uttryck-3": { q: "Utveckla och förenkla: (a + 3)(a - 4)", type: "text", a: "a^2-a-12" },

            // Kategori 4: Ange formeln
            "Ange formeln-1": { 
                q: "Kim har 500 kr och sparar 50 kr/mån. Vilken formel visar saldot S efter m månader?", 
                type: "multi", 
                options: ["S = 500 + 50m", "S = 50m - 500", "S = 500m + 50"], 
                a: ["S = 500 + 50m"] 
            },
            "Ange formeln-2": { 
                q: "En vattenpöl (r=20 cm) ökar med 2 cm/min. Vilken är förändringsfaktorn per minut?", 
                type: "multi", 
                options: ["+2", "-2", "2t", "0.10"], 
                a: ["+2"] 
            },
            "Ange formeln-3": { q: "Flygplan på 8000 m sjunker 500 m/min. Formel för höjden H efter t minuter?", type: "text", a: "H=8000-500t" },

            // Kategori 5: Formel, tabell & graf
            "Formel, tabell & graf-1": { 
                q: "Vad kallas den punkt där linjen skär y-axeln?", 
                type: "multi", 
                options: ["m-värde", "k-värde", "x-axel", "Lutning"], 
                a: ["m-värde"] 
            },
            "Formel, tabell & graf-2": { 
                q: "Om y = 2x + 5, vad är värdet på y när x = 10?", 
                type: "multi", 
                options: ["25", "15", "20", "10"], 
                a: ["25"] 
            },
            "Formel, tabell & graf-3": { q: "Lös ekvationen: y/2 + 3 = y/4 + 4", type: "text", a: "4" },

            // Kategori 6: Linjära funktioner
            "Linjära funktioner-1": { 
                q: "Vilken bokstav brukar representera lutningen i y = kx + m?", 
                type: "multi", 
                options: ["k", "m", "x", "y"], 
                a: ["k"] 
            },
            "Linjära funktioner-2": { 
                q: "Om en linje går nedåt från vänster till höger, är k-värdet:", 
                type: "multi", 
                options: ["Negativt", "Positivt", "Noll", "Oändligt"], 
                a: ["Negativt"] 
            },
            "Linjära funktioner-3": { q: "Fråga 3 (Väntar på dina uppgifter...)", type: "text", a: "svar" }
        };

        // Fyller ut tomma rader automatiskt för demo
        for (let i = 4; i <= 5; i++) {
            categories.forEach(cat => {
                if (!questions[`${cat}-${i}`]) {
                    questions[`${cat}-${i}`] = { q: `Fråga för ${cat} Nivå ${i}`, type: "text", a: "svar" };
                }
            });
        }

        let currentQ = null;
        let currentId = null;

        function init() {
            const board = document.getElementById('game-board');
            categories.forEach(c => board.innerHTML += `<div class="category-header">${c}</div>`);
            
            for(let row=1; row<=5; row++) {
                categories.forEach(cat => {
                    const id = `${cat}-${row}`;
                    board.innerHTML += `<div class="cell" id="${id}" onclick="openQ('${cat}', ${row})">Nivå ${row}</div>`;
                });
            }
        }

        function openQ(cat, row) {
            currentId = `${cat}-${row}`;
            currentQ = questions[currentId];
            document.getElementById('modal-category').innerText = cat + " - Nivå " + row;
            document.getElementById('question-text').innerHTML = currentQ.q;
            const area = document.getElementById('answer-area');
            area.innerHTML = "";

            if(currentQ.type === "text") {
                area.innerHTML = `<input type="text" id="ans" placeholder="Svar..." autocomplete="off">`;
            } else {
                currentQ.options.forEach(o => {
                    area.innerHTML += `<label class="option"><input type="checkbox" name="multi" value="${o}"> ${o}</label>`;
                });
            }
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function checkAnswer() {
            let correct = false;
            if(currentQ.type === "text") {
                const val = document.getElementById('ans').value.replace(/\s/g, "").toLowerCase();
                const target = currentQ.a.replace(/\s/g, "").toLowerCase();
                if(val === target || (parseFloat(val) === parseFloat(target))) correct = true;
            } else {
                const picked = Array.from(document.querySelectorAll('input[name="multi"]:checked')).map(e => e.value);
                correct = picked.length === currentQ.a.length && picked.every(val => currentQ.a.includes(val));
            }

            if(correct) {
                alert("RÄTT! Bra jobbat.");
                totalScore += 100;
                document.getElementById('score-display').innerText = "POÄNG: " + totalScore;
                document.getElementById(currentId).classList.add('disabled');
                document.getElementById(currentId).onclick = null;
                document.getElementById(currentId).innerText = "✔";
                closeModal();
            } else {
                alert("Inte helt rätt. Kolla noga och försök igen!");
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        init();
    </script>
</body>
</html>

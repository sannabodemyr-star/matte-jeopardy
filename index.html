<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Matte-Jeopardy: Ma 1a</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg-color: #1a0f0f;
            --text-gold: #d4af37;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            color: #eee; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        h1 { 
            color: var(--text-gold); 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7); 
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .score-box { 
            background: #2d5a27; 
            color: #fff; 
            padding: 10px 30px; 
            display: inline-block; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-bottom: 25px; 
            font-size: 1.3em;
            box-shadow: 0 4px 0 #1e3a1a;
            border: 1px solid #3e7a36;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(7, minmax(0, 1fr)); 
            gap: 12px; 
            max-width: 1300px; 
            margin: 0 auto; 
            padding-bottom: 40px;
        }

        .category-header { 
            background: #3d2b2b; 
            padding: 15px 5px; 
            font-weight: bold; 
            border-radius: 5px; 
            font-size: 0.75em; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 60px; 
            text-transform: uppercase;
            border-bottom: 3px solid #221a1a;
            color: #d4af37;
        }

        .cell { 
            min-height: 80px;
            padding: 20px 10px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 1.1em; 
            transition: all 0.1s ease; 
            border: none;
            font-weight: bold; 
            color: rgba(255,255,255,0.9);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell:hover { 
            filter: brightness(1.15);
            transform: translateY(-2px);
        }

        .cell.disabled { 
            background: #2a2a2a !important; 
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.6) !important;
            cursor: not-allowed; 
            opacity: 0.4; 
            color: #666;
            transform: translateY(4px);
        }

        #modal { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: #fdfcfb; 
            color: #2c1a1a; 
            padding: 35px; 
            border-radius: 12px; 
            box-shadow: 0 0 60px rgba(0,0,0,0.9); 
            width: 85%; 
            max-width: 600px; 
            z-index: 1001; 
        }

        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 1000; 
        }
        
        button { 
            margin: 10px; padding: 12px 25px; 
            cursor: pointer; background: #8e442d; 
            color: white; border: none; border-radius: 6px; 
            font-size: 1em; font-weight: bold;
            box-shadow: 0 4px 0 #5d2b1d;
        }

        .option { 
            display: block; margin: 10px 0; text-align: left; 
            padding: 15px; background: #f4ece8; 
            border: 1px solid #d1b8ac; border-radius: 8px; 
            cursor: pointer; color: #333;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.2em;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>MATTE-JEOPARDY: Ma 1a</h1>
    <div class="score-box" id="score-display">POÄNG: 0</div>
    
    <div class="grid" id="game-board"></div>

    <div class="overlay" id="overlay"></div>
    <div id="modal">
        <h2 id="modal-category" style="margin-top:0; color: #8e442d; border-bottom: 2px solid #eee; padding-bottom: 10px;"></h2>
        <div id="question-text" style="font-size: 1.3em; margin: 25px 0; line-height: 1.5;"></div>
        <div id="answer-area"></div>
        <button onclick="checkAnswer()">Skicka svar</button>
        <button onclick="closeModal()" style="background:#555; box-shadow: 0 4px 0 #333;">Stäng</button>
    </div>

    <script>
        const categories = ["Ekvationer", "Faktorisering", "Algebraiska uttryck", "Ange formeln", "Formel, tabell & graf", "Linjära funktioner", "Enheter och muffins"];
        const categoryHues = [0, 340, 20, 15, 320, 40, 200];

        const questions = {
            "Ekvationer-1": { q: "Vilket är första steget i förenklingen av \\(2(5y + 3) = 6 + 7y\\)?", type: "multi", options: ["10y + 6 = 6 + 7y", "10y + 3 = 6 + 7y", "10y + 6 = 13y"], a: ["10y + 6 = 6 + 7y"] },
            "Ekvationer-2": { q: "Förenkla VL i ekvationen: \\(4(3x - 5) = 2x + 10\\)", type: "multi", options: ["12x - 20 = 2x + 10", "12x - 5 = 2x + 10", "7x - 20 = 2x + 10"], a: ["12x - 20 = 2x + 10"] },
            "Ekvationer-3": { q: "Lös ekvationen: \\(5(a - 1) = 15 - 3(a + 4)\\)", type: "text", a: "1" },
            "Ekvationer-4": { q: "Lös ekvationen: \\((y + 3)(y - 5) = y^2 - 1\\)", type: "text", a: "-7" },
            "Ekvationer-5": { q: "Lös ekvationen (svara i enklaste bråkform): \\(1 - \\frac{p}{3} = \\frac{p}{2} - \\frac{1}{2}\\)", type: "text", a: "9/5" },

            "Faktorisering-1": { q: "Bryt ut största möjliga faktor ur \\(18a + 9b\\):", type: "multi", options: ["9(2a + b)", "18(a + b)", "9(a + b)"], a: ["9(2a + b)"] },
            "Faktorisering-2": { q: "Vilken är största faktor som kan brytas ut ur \\(7x^2 - 14x\\)?", type: "multi", options: ["7x", "7", "x", "14"], a: ["7x"] },
            "Faktorisering-3": { q: "Faktorisera genom att bryta ut största möjliga faktor: \\(12xy^2 + 6x^2y\\)", type: "text", a: "6xy(2y+x)" },
            "Faktorisering-4": { q: "Förenkla: \\(\\frac{3ab^2 + 12ba^2}{6ab}\\)", type: "text", a: "b/2+2a" },
            "Faktorisering-5": { q: "Vad ska stå i parentesen? \\(4xy( ? ) = 4xy^2 - 6xy + 12x^2\\)", type: "text", a: "y-1,5+3x/y" },

            "Algebraiska uttryck-1": { q: "Alva är A år gammal och Berit är B år gammal. Vad betyder \\(A = B + 7\\)?", type: "multi", options: ["Alva är 7 år yngre än Berit", "Alva är 7 år äldre än Berit", "Berit är 7 år yngre än Alva", "Berit är 7 år äldre än Alva"], a: ["Alva är 7 år äldre än Berit", "Berit är 7 år yngre än Alva"] },
            "Algebraiska uttryck-2": {q: "Vilket av följande uttryck kan \\((a + 3)(a - 4)\\) förenklas till?", type: "multi", options: ["\\(a^2-12\\)", "\\(a^2+7a+12\\)", "\\(a^2-a+12\\)", "\\(a^2-a-12\\)", "\\(a^2+a-12\\)", "\\(2a-1\\)" ], a: ["\\(a^2-a-12\\)"] },
            "Algebraiska uttryck-3": { q: "Alva är A år gammal och Berit är B år gammal. Vilka påståenden beskriver \\(A - B = -9\\) rätt?", type: "multi", options: ["Alva är 9 år yngre än Berit", "Alva är 9 år äldre än Berit", "Berit är 9 år yngre än Alva", "Berit är 9 år äldre än Alva",], a: ["Alva är 9 år yngre än Berit", "Berit är 9 år äldre än Alva"] },
            "Algebraiska uttryck-4": { q: "Maria har m kronor i lön. Lönen sänks först med 200 kronor och sedan med ytterligare 20 %. Vilket uttryck motsvarar Marias nya lön?", type: "multi", options: ["m-220", "m-200-0,2", "0,8m - 160", "0,8m - 200", "0,8(m-200)"], a: ["0,8(m-200)", "0,8m - 160"] },
            "Algebraiska uttryck-5": { q: "Alva är A år gammal och Berit är B år gammal. Vad betyder uttrycket \\(A = B - 0.10B\\)?", type: "multi", options: ["Berit är 0,1 år yngre än Alva", "Berit är 10 % yngre än Alva", "Alva är 10 % yngre än Berit"], a: ["Alva är 10 % yngre än Berit"] },

            "Ange formeln-1": { q: "Kim har 500 kr, sparar 50 kr/mån. Skriv en formel för Kims saldo S efter m månader?", type: "multi", options: ["S = m + 50","S = 500 + 50m", "S = 50m - 500", "S = 550m"], a: ["S = 500 + 50m"] },
            "Ange formeln-2": { q: "En minibassäng är fylld med 600 liter vatten och läcker med 0,5 liter per minut. Vilken formel, där y är mängden vatten i liter och x är antal minuter, beskriver detta?", type: "multi", options: ["y =600-0,5 ", "y = 600x-0,5", "y = 600-0,5x","y = 600*0,5*x"], a: ["y = 600-0,5x"] },
            "Ange formeln-3": { q: "Ett flygplan befinner sig på på 8000 m höjd sjunker 500 m/min. Skriv en formel för höjden H i meter efter t minuter?", type: "text", a: "H=8000-500t" },
            

            "Formel, tabell & graf-1": { q: "Grafen visar hur Simons lön beror på tiden. Hur länge måste Simon jobba för att tjäna 600 kronor? <br><img src='linjar1.png' alt='Graf'>", type: "multi", options: ["3 timmar", "4 timmar", "6 timmar", "8 timmar"], a: ["8 timmar"] },
            "Formel, tabell & graf-2": { q: "Om \\(y=3x+2\\), vad är y när x=4?", type: "multi", options: ["14", "12", "9", "5"], a: ["14"] },
            "Formel, tabell & graf-3": { q: "Tabellen hör ihop med formeln \\(y=2x+4\\). Vad ska det stå i den blå rutan? <br><img src='tabell1.png' alt='Tabell'>", type: "text", a: "5" },
            "Formel, tabell & graf-4": { q: "Om \\(y=3x+2\\), vilket värde på x gör att y = 23?", type: "text", a: "7" },
            "Formel, tabell & graf-5": { q: "Tabellen hör ihop med formeln \\(y=2x+4\\). Vad ska det stå i den gula rutan? <br><img src='tabell1.png' alt='Tabell'>", type: "text", a: "2.5" },

            "Linjära funktioner-1": { q: "Grafen visar Simons lön. Vad har Simon i timlön? <br><img src='linjar1.png' alt='Graf'>", type: "multi", options: ["ca 60 kr", "ca 100 kr", "ca 75 kr", "ca 90 kr"], a: ["ca 75 kr"] },
            "Linjära funktioner-2": { q: "Sanna planterar en solros. Formeln är \\(y = 20 + 3x\\). Hur lång är den 13 juli i dm?", type: "text", a: "5.9" },
            "Linjära funktioner-3": { q: "Formeln är \\(y = 20 + 3x\\). Hur många cm växer den per dag?", type: "text", a: "3" },
            "Linjära funktioner-4": { q: "Vilket m-värde har en linje som går genom origo?", type: "text", a: "0" },
            "Linjära funktioner-5": { q: "Bestäm formeln för linjen genom (0, 4) och (2, 10).", type: "text", a: "y=3x+4" },

            /* NYA FRÅGOR: ENHETER OCH MUFFINS */
            "Enheter och muffins-1": { 
                q: "Vad betyder prefixet 'kilo' (k)?", 
                type: "multi", 
                options: ["10", "100", "1000", "0,001"], 
                a: ["1000"] 
            },
            "Enheter och muffins-2": { 
                q: "Hur många milligram (mg) är 3,5 kilogram (kg)?", 
                type: "text", 
                a: "3500000",
                unit: "mg"
            },
            "Enheter och muffins-3": { 
                q: "Receptet för 12 muffins kräver 2 ägg. Hur många ägg behövs för att baka 18 muffins?", 
                type: "text", 
                a: "3",
                unit: "st ägg"
            },
            "Enheter och muffins-4": { 
               q: "Sanna använde 1,2 dl kakao. Receptet kräver 4 msk för 12 muffins. Hur många muffins bakade hon?", 
                type: "text", 
                a: "24",
                unit: "muffins"

            },
            "Enheter och muffins-5": { 
                 q: "Sanna har ett 500 g paket smör. Receptet kräver 150 g smör för 12 muffins. Hur många muffins kan hon maximalt baka?", 
                type: "text", 
                a: "40",
                unit: "muffins"
                            }
        };

        let totalScoreVal = 0;
        let currentQ = null;
        let currentId = null;

        function init() {
            const board = document.getElementById('game-board');
            board.innerHTML = "";
            categories.forEach((c, index) => {
                const hue = categoryHues[index];
                board.innerHTML += `<div class="category-header" style="border-top: 3px solid hsl(${hue}, 40%, 40%)">${c}</div>`;
            });
            
            for(let row=1; row<=5; row++) {
                categories.forEach((cat, colIndex) => {
                    const id = `${cat}-${row}`;
                    const hue = categoryHues[colIndex];
                    const lightness = 45 - (row * 4);
                    const shadowColor = `hsl(${hue}, 40%, ${lightness - 12}%)`;
                    const bgColor = `linear-gradient(145deg, hsl(${hue}, 35%, ${lightness + 5}%), hsl(${hue}, 35%, ${lightness}%))`;
                    
                    board.innerHTML += `
                        <div class="cell" id="${id}" 
                             onclick="openQ('${cat}', ${row})" 
                             style="background: ${bgColor}; box-shadow: 0 6px 0 ${shadowColor}, 0 8px 15px rgba(0,0,0,0.5);">
                             Nivå ${row}
                        </div>`;
                });
            }
        }

        function openQ(cat, row) {
            currentId = `${cat}-${row}`;
            currentQ = questions[currentId];
            if(!currentQ) return; 

            document.getElementById('modal-category').innerText = cat + " (Nivå " + row + ")";
            document.getElementById('question-text').innerHTML = currentQ.q;
            const area = document.getElementById('answer-area');
            area.innerHTML = "";

            if(currentQ.type === "text") {
                // Här läggs enheten till efter input-rutan om den finns definierad
                const unitText = currentQ.unit ? `<span>${currentQ.unit}</span>` : "";
                area.innerHTML = `
                    <div class="input-wrapper">
                        <input type="text" id="ans" placeholder="Svar..." autocomplete="off" style="padding:10px; width:150px;">
                        ${unitText}
                    </div>`;
            } else {
                currentQ.options.forEach(o => {
                    area.innerHTML += `<label class="option"><input type="checkbox" name="multi" value="${o}"> ${o}</label>`;
                });
            }
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';

            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function checkAnswer() {
            let isCorrect = false;
            if(currentQ.type === "text") {
                const val = document.getElementById('ans').value.trim().toLowerCase().replace(",", ".");
                const target = currentQ.a.toLowerCase().replace(",", ".");
                if(val === target) isCorrect = true;
            } else {
                const picked = Array.from(document.querySelectorAll('input[name="multi"]:checked')).map(e => e.value);
                isCorrect = picked.length === currentQ.a.length && picked.every(val => currentQ.a.includes(val));
            }

            if(isCorrect) {
                alert("RÄTT!");
                totalScoreVal += rowToPoints(currentId);
                document.getElementById('score-display').innerText = "POÄNG: " + totalScoreVal;
                const cell = document.getElementById(currentId);
                cell.classList.add('disabled');
                cell.onclick = null;
                cell.innerText = "✔";
                closeModal();
            } else {
                alert("Tyvärr, försök igen!");
            }
        }

        function rowToPoints(id) {
            const row = parseInt(id.split('-').pop());
            return row * 100;
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
